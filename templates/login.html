<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Scouts Terrain</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/aws-amplify/dist/aws-amplify.min.js"></script>
  <script src="/static/config.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #08204f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .login-card {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }
    .logo {
      width: 60px;
      margin-bottom: 1rem;
    }
    .form-label {
      margin-top: 1rem;
    }
    .btn-login {
      margin-top: 1.5rem;
      width: 100%;
    }
    .form-control:disabled {
      background-color: #e9ecef;
    }
    .footer-links {
      font-size: 0.85rem;
      margin-top: 1rem;
      text-align: center;
    }
    .footer-links a {
      color: #0d6efd;
      text-decoration: none;
      margin: 0 0.5rem;
    }
    .footer-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="text-center">
    <img src="/static/terrain-logo.svg" alt="Scouts Terrain Logo" class="logo">
  </div>
  <div class="login-card">
    <h2 class="text-center mb-3">Log in</h2>
    <form id="loginForm" novalidate>
      <div class="mb-3">
        <label for="branch" class="form-label">Select Branch</label>
        <select id="branch" class="form-select">
          <option value="">-- Select --</option>
          <option value="ACT-">ACT</option>
          <option value="NSW-">NSW</option>
          <option value="NT-">NT</option>
          <option value="QLD-">QLD</option>
          <option value="SA-">SA</option>
          <option value="TAS-">TAS</option>
          <!-- Add more branches -->
        </select>
      </div>
      <div class="mb-3">
        <label for="username" class="form-label">Member Number</label>
        <input type="text" class="form-control" id="username" inputmode="numeric" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-login">Log In</button>
      <div id="loginError" class="text-danger small mt-2 d-none"></div>
    </form>
    <div class="footer-links">
      <a href="#">Help</a> | <a href="#">Privacy</a>
    </div>
  </div>

  <script>
    Amplify.default.configure({
      Auth: {
        region: window.cognitoConfig.region,
        userPoolId: window.cognitoConfig.userPoolId,
        userPoolWebClientId: window.cognitoConfig.clientId,
      }
    });

    const { Auth } = window.Amplify;

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const branch = document.getElementById("branch").value;
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      const fullUsername = `${branch}${username}`;
      const errorDiv = document.getElementById("loginError");

      try {
        const user = await Auth.signIn(fullUsername, password);
        const idToken = user.signInUserSession.idToken.jwtToken;
        const accessToken = user.signInUserSession.accessToken.jwtToken;

        window.userData = {
          id_token: idToken,
          access_token: accessToken,
          member_id: null
        };

        sessionStorage.setItem("id_token", idToken);
        errorDiv.classList.add("d-none");

        window.location.href = "/calendar";
      } catch (err) {
        console.error("Login error:", err);
        errorDiv.textContent = err.message || "Login failed";
        errorDiv.classList.remove("d-none");
      }
    });
  </script>
</body>
</html>
