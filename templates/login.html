<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Scouts Terrain</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/aws-amplify@5.3.12/dist/aws-amplify.min.js"></script>
  <style>
    body {
      background-color: #08204f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .login-card {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }
    .logo {
      width: 60px;
      margin-bottom: 1rem;
    }
    .form-label {
      margin-top: 1rem;
    }
    .btn-login {
      margin-top: 1.5rem;
      width: 100%;
    }
    .form-control:disabled {
      background-color: #e9ecef;
    }
    .footer-links {
      font-size: 0.85rem;
      margin-top: 1rem;
      text-align: center;
    }
    .footer-links a {
      color: #0d6efd;
      text-decoration: none;
      margin: 0 0.5rem;
    }
    .footer-links a:hover {
      text-decoration: underline;
    }
    #errorMessage {
      display: none;
      margin-top: 1rem;
    }
  </style>
</head>
<body>

  <div class="text-center">
    <img src="{{ url_for('static', filename='terrain-logo.svg') }}" alt="Scouts Terrain Logo" class="logo">
  </div>

  <div class="login-card">
    <h2 class="text-center mb-3">Log in</h2>

    <div id="errorMessage" class="alert alert-danger" role="alert"></div>

    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="mb-3">
        <label for="branch" class="form-label">Select Branch</label>
        <select class="form-select" id="branch" required>
          <option value="">-- Select --</option>
          <option value="ACT-">ACT</option>
          <option value="NSW-">NSW</option>
          <option value="NT-">NT</option>
          <option value="QLD-">QLD</option>
          <option value="SA-">SA</option>
          <option value="TAS-">TAS</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="username" class="form-label">Member Number</label>
        <input type="text" class="form-control" id="username" placeholder="Member Number" inputmode="numeric" pattern="\d+" required>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Password" required>
      </div>

      <button type="submit" class="btn btn-primary btn-login">Log In</button>
    </form>

    <div class="footer-links">
      <a href="#">Help</a> | <a href="#">Privacy</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { loginToTerrain } from '/static/apiService.js';

    // Configure Amplify with values from Flask
    window.Amplify.configure({
      Auth: {
        region: '{{ aws_region }}',
        userPoolWebClientId: '{{ cognito_client_id }}',
        mandatorySignIn: true
      }
    });

    window.handleLogin = async function(event) {
      event.preventDefault();
      
      const errorMessage = document.getElementById('errorMessage');
      const form = document.getElementById('loginForm');
      const submitButton = form.querySelector('button[type="submit"]');
      
      try {
        submitButton.disabled = true;
        errorMessage.style.display = 'none';
        
        const branch = document.getElementById('branch').value;
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        
        await loginToTerrain(branch, username, password);
        window.location.href = '/dashboard';
      } catch (err) {
        errorMessage.textContent = `Login failed: ${err.message}`;
        errorMessage.style.display = 'block';
      } finally {
        submitButton.disabled = false;
      }
      
      return false;
    };
  </script>
</body>
</html>
