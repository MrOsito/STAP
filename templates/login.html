<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login – STAP</title>
  <script src="https://unpkg.com/aws-amplify@5.0.4/dist/aws-amplify.min.js"></script>
  <script src="/static/config.js"></script>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: auto; padding-top: 4rem; }
    label, input { display: block; width: 100%; margin-bottom: 0.5rem; }
    button { width: 100%; margin-top: 1rem; }
  </style>
</head>
<body>
  <h2>Login to STAP</h2>
  <form id="loginForm">
    <label>
      Branch (e.g. nsw)
      <input type="text" id="branch" value="nsw" required>
    </label>
    <label>
      Member Number
      <input type="text" id="username" required>
    </label>
    <label>
      Password
      <input type="password" id="password" required>
    </label>
    <button type="submit">Log In</button>
    <p id="loginStatus" style="color: red;"></p>
  </form>

  <script>
    const { Auth } = window.Amplify;

    Amplify.default.configure({
      Auth: {
        region: window.cognitoConfig.region,
        userPoolId: window.cognitoConfig.userPoolId,
        userPoolWebClientId: window.cognitoConfig.clientId,
      }
    });

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const branch = document.getElementById("branch").value;
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      const fullUsername = `${branch}${username}`;

      try {
        const user = await Auth.signIn(fullUsername, password);
        const idToken = user.signInUserSession.idToken.jwtToken;
        const accessToken = user.signInUserSession.accessToken.jwtToken;

        window.userData = {
          id_token: idToken,
          access_token: accessToken,
          member_id: null // You can populate this after fetching /profiles
        };

        // Optional: Save to sessionStorage or a cookie
        sessionStorage.setItem("id_token", idToken);

        // Redirect to calendar
        window.location.href = "/calendar";
      } catch (err) {
        console.error("Login error", err);
        document.getElementById("loginStatus").textContent = err.message || "Login failed";
      }
    });
  </script>
</body>
</html>
