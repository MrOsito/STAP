{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center min-vh-75">
  <div class="card shadow p-4" id="dashboardContent" style="width: 100%; max-width: 800px;">
    <div class="text-center text-muted">Loading your profile...</div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  async function loadUserProfile() {
    try {
      const res = await fetch('/profile');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      window.userProfile = data;
      renderDashboard(data);
    } catch (err) {
      console.error("Failed to fetch user profile:", err);
      document.getElementById('dashboardContent').innerHTML =
        `<div class="text-danger text-center">Failed to load profile. Try again later.</div>`;
    }
  }

  function renderDashboard(profile) {
    const user = profile.profiles?.[0]?.member || {};
    const unit = profile.profiles?.[0]?.unit || {};
    const group = profile.profiles?.[0]?.group || {};
    const unitMembers = profile.profiles?.[0]?.unit_members || [];
    const groupMembers = profile.profiles?.[0]?.group_members || [];

    const html = `
      <h2 class="mb-4 text-center">Welcome, ${user.name || "Unknown"}</h2>

      <div class="d-flex flex-column flex-md-row justify-content-center gap-3 mb-4">
        <a href="/calendar" class="btn btn-primary">Go to Calendar</a>
        <a href="/settings" class="btn btn-secondary">Settings</a>
        <a href="/logout" class="btn btn-danger">Logout</a>
      </div>

      ${renderSection("Member Details", [
        ["Member Name", user.name],
        ["Member ID", user.id]
      ])}

      ${renderSection("Unit Details", [
        ["Unit Name", unit.name],
        ["Unit ID", unit.id],
        ["Unit Section", unit.section],
        ["Unit Roles", (unit.roles || []).join(", ")]
      ])}

      ${renderSection("Group Details", [
        ["Group Name", group.name],
        ["Group ID", group.id],
        ["Group Roles", (group.roles || []).join(", ")]
      ])}

      ${renderMemberList("Unit Members", unitMembers)}
      ${renderMemberList("Group Members", groupMembers)}
    `;

    document.getElementById('dashboardContent').innerHTML = html;
  }

  function renderSection(title, rows) {
    const rowHtml = rows.map(([label, value]) => `
      <div class="col-md-6"><p><strong>${label}:</strong> ${value || '—'}</p></div>
    `).join("");
    return `
      <div class="mb-4">
        <h4 class="text-primary border-bottom pb-2">${title}</h4>
        <div class="row g-2">${rowHtml}</div>
      </div>
    `;
  }

  function renderMemberList(title, members) {
    const listHtml = members.length
      ? members.map(m => `
          <div class="col-md-6 mb-2">
            <strong>${m.first_name} ${m.last_name}</strong><br>
            <small class="text-muted">ID: ${m.id}</small>
          </div>`).join("")
      : `<div class="col-12 text-muted">No ${title.toLowerCase()} found.</div>`;

    return `
      <div class="mb-4">
        <h4 class="text-primary border-bottom pb-2">${title}</h4>
        <div class="card">
          <div class="card-body">
            <div class="row">${listHtml}</div>
          </div>
        </div>
      </div>
    `;
  }

  document.addEventListener('DOMContentLoaded', loadUserProfile);
</script>
{% endblock %}
